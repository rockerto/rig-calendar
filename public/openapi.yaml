openapi: 3.1.0
info:
  title: RIG Calendar Bot
  description: API para consultar y agendar sesiones quiroprácticas con RIG.
  version: "1.0.0"
servers:
  - url: https://rig-calendar.vercel.app
paths:
  /api:
    post:
      summary: Obtener horas disponibles
      operationId: getAvailableAppointments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start_date:
                  type: string
                  example: "2025-04-11"
                end_date:
                  type: string
                  example: "2025-04-11"
      responses:
        '200':
          description: Lista de horas disponibles
  /api/book-appointment:
    post:
      summary: Agendar una cita
      operationId: bookAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  example: "2025-04-14"
                time:
                  type: string
                  example: "15:00"
                patient:
                  type: object
                  properties:
                    name:
                      type: string
                    rut:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
      responses:
        '200':
          description: Confirmación de cita
