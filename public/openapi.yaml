openapi: 3.0.1
info:
  title: RIG Calendar Bot
  description: Permite consultar disponibilidad y agendar horas con RIG en Copiapó.
  version: "1.0.0"
servers:
  - url: https://rig-calendar.vercel.app
paths:
  /api/index-GCAL.cjs:
    post:
      operationId: getAvailableAppointments
      summary: Obtener disponibilidad de horas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityRequest"
      responses:
        "200":
          description: Lista de horas disponibles
  /api/book-appointment:
    post:
      operationId: bookAppointment
      summary: Agendar una cita en el calendario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingRequest"
      responses:
        "200":
          description: Confirmación de la hora agendada
components:
  schemas:
    AvailabilityRequest:
      type: object
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
      required:
        - start_date
        - end_date
    BookingRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        time:
          type: string
        patient:
          type: object
          properties:
            name:
              type: string
            rut:
              type: string
            phone:
              type: string
            email:
              type: string
          required:
            - name
            - rut
            - phone
            - email
      required:
        - date
        - time
        - patient
