openapi: 3.1.0
info:
  title: RIG Calendar API
  version: 1.0.0
servers:
  - url: https://rig-calendar.vercel.app
paths:
  /api:
    post:
      summary: Obtener horarios disponibles
      operationId: getAvailableAppointments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start_date:
                  type: string
                end_date:
                  type: string
              required:
                - start_date
                - end_date
      responses:
        "200":
          description: Lista de horarios disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  availableAppointments:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                        time:
                          type: string
